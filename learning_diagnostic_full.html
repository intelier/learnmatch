<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학습 성향 진단 & 학원 매칭 - 풀 데모</title>
<style>
:root{
  --surface-0:#f7f6f2; --surface-1:#f1efe8; --surface-2:#ffffff;
  --text-primary:#2c2c2a; --text-secondary:#5f5e5a; --text-muted:#888780;
  --border:#e3e1d8; --border-strong:#cfcdc2;
  --fill-accent:#185fa5; --on-accent:#ffffff;
  --text-accent:#185fa5; --bg-accent:#e6f1fb; --border-accent:#85b7eb;
  --text-success:#27500a; --bg-success:#eaf3de;
  --text-warning:#854f0b; --bg-warning:#faeeda;
  --text-danger:#7a1a1a; --bg-danger:#fde8e8;
  --radius:8px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--surface-0); color:var(--text-primary); line-height:1.6; font-size:15px;}
#root{max-width:600px; margin:0 auto; padding:0;}

/* 탭 */
#tab-bar{display:flex; border-bottom:1px solid var(--border); background:var(--surface-2); position:sticky; top:0; z-index:10;}
.tab-btn{flex:1; padding:14px; font-size:14px; font-weight:500; border:none; background:transparent; cursor:pointer; color:var(--text-muted); border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--text-accent); border-bottom-color:var(--fill-accent);}

/* 공용 */
#content{padding:1.5rem 1.25rem 4rem;}
h1{font-size:20px; font-weight:500;}
h2{font-size:17px; font-weight:500;}
h3{font-size:14px; font-weight:500;}
p{margin:0;}
button{font-family:inherit; cursor:pointer;}
.muted{color:var(--text-secondary);}
.tiny{font-size:12px; color:var(--text-muted);}
.card{background:var(--surface-2); border:0.5px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px;}
.progress-bar{height:4px; background:var(--surface-1); border-radius:4px; margin-bottom:1.5rem; overflow:hidden;}
.progress-fill{height:100%; background:var(--fill-accent); transition:width .3s;}

/* 버튼 */
.btn-primary{width:100%; background:var(--fill-accent); color:var(--on-accent); border:none; padding:12px; font-size:14px; font-weight:500; border-radius:var(--radius);}
.btn-ghost{width:100%; background:transparent; border:0.5px solid var(--border-strong); padding:11px; font-size:14px; font-weight:500; border-radius:var(--radius);}

/* 선택지 */
.opt-btn{width:100%; text-align:left; border:0.5px solid var(--border-strong); background:var(--surface-2); padding:13px 14px; border-radius:var(--radius); font-size:14px; display:block; margin-bottom:8px;}
.opt-btn:hover{background:var(--bg-accent); border-color:var(--border-accent);}

/* 필 */
.pill{border:0.5px solid var(--border-strong); background:var(--surface-2); padding:8px 14px; border-radius:20px; font-size:13px; display:inline-block; margin:0 6px 6px 0;}
.pill.on{background:var(--bg-accent); border-color:var(--border-accent); color:var(--text-accent);}

/* 입력 */
input[type=text], input[type=number], textarea, select{
  width:100%; border:0.5px solid var(--border-strong); border-radius:var(--radius);
  padding:9px 12px; font-size:14px; background:var(--surface-2); font-family:inherit; color:var(--text-primary);
}
textarea{resize:vertical; min-height:60px; line-height:1.6;}
label{display:block; font-size:13px; font-weight:500; margin-bottom:6px; margin-top:1.1rem;}
label:first-child{margin-top:0;}

/* 알림 박스 */
.alert{border-radius:var(--radius); padding:12px 14px; font-size:13px; line-height:1.6; margin-bottom:1rem;}
.alert.warning{background:var(--bg-warning); color:var(--text-warning);}
.alert.info{background:var(--bg-accent); color:var(--text-accent);}
.alert.success{background:var(--bg-success); color:var(--text-success);}
.alert.danger{background:var(--bg-danger); color:var(--text-danger);}

/* 점수 바 */
.score-row{display:flex; align-items:center; gap:8px; margin-bottom:5px;}
.score-row span{font-size:11px; color:var(--text-muted); width:80px; text-align:right;}
.score-row span:last-child{text-align:left;}
.score-track{flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden;}
.score-fill{height:100%; border-radius:3px; background:var(--fill-accent);}

/* 스펙트럼 슬라이더 */
.spectrum-row{margin-bottom:1rem;}
.spectrum-labels{display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-bottom:4px;}
input[type=range]{width:100%; accent-color:var(--fill-accent);}

/* 학원 카드 */
.acad-card{border:0.5px solid var(--border); border-radius:12px; padding:14px 16px; margin-bottom:10px; background:var(--surface-2);}
.acad-header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px;}
.acad-meta{display:flex; gap:14px; font-size:12px; color:var(--text-secondary); margin-bottom:8px;}
.tag{font-size:11px; background:var(--surface-1); color:var(--text-secondary); padding:3px 8px; border-radius:10px; display:inline-block; margin:0 4px 4px 0;}

/* 별점 */
.stars{color:#f5a623;}
</style>
</head>
<body>
<div id="root">
  <div id="tab-bar">
    <button class="tab-btn active" id="tab-parent" onclick="switchTab('parent')">🔍 학부모 진단</button>
    <button class="tab-btn" id="tab-academy" onclick="switchTab('academy')">🏫 학원 등록</button>
  </div>
  <div id="content"></div>
</div>

var TOPICS = {

  structure:['매일','체크','관리','꼼꼼','테스트'],
  pressure:['경쟁','등수','성과','빠르게'],
  emotion:['마음','감정','공감','편안','즐겁게']
};
var TOPIC_LABEL={autonomy:'자기주도',social:'함께배움',patience:'느린아이배려',structure:'관리·구조',pressure:'경쟁·결과',emotion:'정서케어'};

/* 미리 등록된 학원 (초기값) */
var registeredAcademies = [

    name:'사고력수학 OO학원', subject:'수학', emoji:'📐',
    desc:'스스로 생각하는 힘을 키우는 소그룹 수학 학원',

    size:4, price:38, manage:'보통', pace:'현행 심화',
    profile:{autonomy:2,zpd_strain:0,competence:1,burnout:-2,social:1,style:'visual',focus:'deep'},
    reviews:127, rating:4.8
  },
  {

    desc:'아이 속도에 맞춰 천천히, 정서를 먼저 살피는 공부방',
    philosophy:'아이가 힘들어하면 진도보다 대화를 먼저 해요. 천천히 단계별로 기다려줘요.',
    fit_note:'느린 아이도 환영해요. 반복해도 괜찮아요, 차근차근 가는 게 우선이에요.',
    size:2, price:45, manage:'약함', pace:'현행 위주',
    profile:{autonomy:0,zpd_strain:-1,competence:1,burnout:-2,social:-1,style:'auditory',focus:'mixed'},
    reviews:54, rating:4.9
  },
  {
    name:'1등 전략학원', subject:'수학·영어', emoji:'🏆',
    desc:'경쟁과 성과 중심, 꼼꼼한 관리형 학원',
    philosophy:'매일 숙제를 꼼꼼히 체크하고 테스트로 확인합니다.',
    fit_note:'목표 의식이 뚜렷하고 등수로 동기부여 받는 아이에게 추천해요.',

    profile:{autonomy:-1,zpd_strain:1,competence:0,burnout:1,social:0,style:'auditory',focus:'broad'},
    reviews:203, rating:4.3
  },
  {
    name:'탐구형 영어 XX학원', subject:'영어', emoji:'🗣️',

    philosophy:'책으로만 배우지 않고 직접 만들고 발표하면서 영어를 익혀요.',
    fit_note:'친구들과 함께 활동하며 배우는 걸 좋아하는 아이에게 잘 맞아요.',
    size:5, price:42, manage:'보통', pace:'현행',

    reviews:89, rating:4.6
  }

/* ───────────── 상태 ───────────── */
var parentState = { step:0, answers:{}, kwBag:[], parentWants:[] };
var acadForm = {
  name:'', subject:[], grade:[], price:'', extra:[],
  one_liner:'', philosophy:'',
  format:[], size:'', talkratio:'', pace:'',
  homework:'', test:'', feedback:'',
  refusal:'', praise:'', emotion_note:'',
  career:[], direct:'', teacher_note:'',
  fit_tags:[], fit_note:'',
  sliders:{lecture_discuss:50, fixed_individual:50, strict_free:50, result_process:50},
  gu:'', parking:'', shuttle:'', schedule:'', recruit_level:'',
  step:0
};
var currentTab = 'parent';

/* ───────────── 유틸 ───────────── */
function el(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function topicVec(text){
  var v={}; Object.keys(TOPICS).forEach(function(k){v[k]=0;});
  if(!text) return v;
  Object.keys(TOPICS).forEach(function(k){
    TOPICS[k].forEach(function(w){ if(text.indexOf(w)>=0) v[k]+=1; });
  });
  return v;
}
function cosine(a,b){
  var keys=Object.keys(TOPICS),dot=0,na=0,nb=0;
  keys.forEach(function(k){ dot+=a[k]*b[k]; na+=a[k]*a[k]; nb+=b[k]*b[k]; });
  if(na===0||nb===0) return 0;
  return dot/(Math.sqrt(na)*Math.sqrt(nb));
}

/* ───────────── 탭 전환 ───────────── */
function switchTab(tab){
  currentTab = tab;
  document.getElementById('tab-parent').className = 'tab-btn'+(tab==='parent'?' active':'');
  document.getElementById('tab-academy').className = 'tab-btn'+(tab==='academy'?' active':'');
  renderContent();
}

function renderContent(){
  var c = document.getElementById('content');
  c.innerHTML = '';
  if(currentTab === 'parent') c.appendChild(renderParent());
  else c.appendChild(renderAcademy());
}

/* ═══════════════════════════════════════
   학부모 진단 탭
═══════════════════════════════════════ */
function renderParent(){
  var s = parentState;
  if(s.step===0) return renderParentIntro();
  if(s.step===1) return renderParentNeeds();
  if(s.step>=2 && s.step<2+QUESTIONS.length) return renderParentQ(s.step-2);
  if(s.step===2+QUESTIONS.length) return renderParentLoading();
  return renderParentReport();
}

function renderParentIntro(){
  var wrap=el('<div style="text-align:center; padding:2.5rem 1rem;"></div>');
  wrap.innerHTML =
    '<div style="font-size:44px; margin-bottom:1rem;">🧭</div>' +
    '<h1 style="margin-bottom:.75rem;">우리 아이에게 맞는 학원,<br>찾고 계신가요?</h1>' +
    '<p class="muted" style="max-width:420px; margin:0 auto 1.75rem; line-height:1.75;">막연히 남 따라가는 학원 말고, 아이 성향에 맞는 학원을 찾아드려요. 10분이면 충분해요.</p>' +
    '<button class="btn-primary" id="s-btn" style="max-width:240px;">시작하기</button>';
  wrap.querySelector('#s-btn').onclick=function(){ parentState.step=1; renderContent(); };
  return wrap;
}

function renderParentNeeds(){
  var wants=['성적을 올리고 싶다','선행을 시키고 싶다','기초를 잡아주면 좋겠다','공부 습관을 만들고 싶다','아이가 즐겁게 다녔으면 한다'];
  var wrap=el('<div></div>');
  var pBar = el('<div class="progress-bar"><div class="progress-fill" style="width:10%;"></div></div>');
  wrap.appendChild(pBar);
  var title = el('<div><h2 style="margin-bottom:.4rem;">지금 가장 원하는 게 뭔가요?</h2><p class="muted" style="font-size:13px; margin-bottom:1rem;">복수 선택 가능해요</p></div>');
  wrap.appendChild(title);
  var pillBox = el('<div style="margin-bottom:1.5rem;"></div>');
  wants.forEach(function(w){
    var btn=el('<button class="pill">'+w+'</button>');
    if(parentState.parentWants.indexOf(w)>=0) btn.classList.add('on');
    btn.onclick=function(){
      var i=parentState.parentWants.indexOf(w);
      if(i>=0){ parentState.parentWants.splice(i,1); btn.classList.remove('on'); }
      else { parentState.parentWants.push(w); btn.classList.add('on'); }
    };
    pillBox.appendChild(btn);
  });
  wrap.appendChild(pillBox);
  var nextBtn=el('<button class="btn-primary">다음</button>');
  nextBtn.onclick=function(){ parentState.step=2; renderContent(); };
  wrap.appendChild(nextBtn);
  return wrap;
}

function renderParentQ(idx){
  var q=QUESTIONS[idx];
  var pct = Math.round(((2+idx)/(2+QUESTIONS.length))*100);
  var wrap=el('<div></div>');
  wrap.innerHTML =
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;"></div></div>' +
    '<p class="tiny" style="margin-bottom:.25rem;">질문 '+(idx+1)+' / '+QUESTIONS.length+'</p>' +
    '<h2 style="margin-bottom:1.25rem;">'+q.text+'</h2>';
  q.opts.forEach(function(o){
    var btn=el('<button class="opt-btn">'+o.t+'</button>');
    btn.onclick=function(){
      parentState.answers[q.id]=o.v;
      parentState.kwBag=parentState.kwBag.concat(o.kw||[]);
      parentState.step++;
      renderContent();
    };
    wrap.appendChild(btn);
  });
  return wrap;
}

function renderParentLoading(){
  var wrap=el('<div style="text-align:center; padding:3rem 1rem;"></div>');
  wrap.innerHTML =
    '<div style="font-size:36px;">✨</div>' +
    '<p class="muted" style="margin-top:1rem;">학습 성향을 분석하고 학원과 매칭하고 있어요</p>' +
    '<div class="progress-bar" style="width:220px; margin:1rem auto;">' +
      '<div id="load-bar" class="progress-fill" style="width:0%;"></div></div>';
  setTimeout(function(){ var b=document.getElementById('load-bar'); if(b) b.style.width='100%'; },60);
  setTimeout(function(){ parentState.step++; renderContent(); },1300);
  return wrap;
}

function computeProfile(){
  var p={autonomy:0,zpd_strain:0,competence:0,burnout:0,social:0,focus:'mixed',style:'visual'};
  var sc={}, fc={};
  Object.keys(parentState.answers).forEach(function(k){
    var v=parentState.answers[k];
    ['autonomy','zpd_strain','competence','burnout','social'].forEach(function(d){ if(v[d]!==undefined) p[d]+=v[d]; });
    if(v.style) sc[v.style]=(sc[v.style]||0)+1;
    if(v.focus) fc[v.focus]=(fc[v.focus]||0)+1;
  });
  var bs='visual',bn=-1; Object.keys(sc).forEach(function(s){ if(sc[s]>bn){bn=sc[s]; bs=s;} });
  p.style=bs;
  var bf='mixed',bfn=-1; Object.keys(fc).forEach(function(s){ if(fc[s]>bfn){bfn=fc[s]; bf=s;} });
  p.focus=bf;
  return p;
}

function matchScore(child, childText, acad){
  if(child.burnout>=3 && acad.manage==='강함') return {excluded:true};
  var zpdDiff=Math.abs((child.zpd_strain||0)-(acad.profile.zpd_strain||0));
  var zScore=clamp(100-zpdDiff*20,0,100);
  var aDiff=Math.abs((child.autonomy||0)-(acad.profile.autonomy||0));
  var aScore=clamp(100-aDiff*18,0,100);
  var stScore=child.style===acad.profile.style?100:55;
  var szFit=100;
  if(child.social<=-1&&acad.size>8) szFit=50;
  if(child.social>=1&&acad.size>=3&&acad.size<=6) szFit=100;
  var bScore=100;
  if(child.burnout>=1&&acad.manage==='강함') bScore=40;
  else if(child.burnout>=1) bScore=88;
  var quant=(zScore*0.30+aScore*0.25+bScore*0.20+stScore*0.15+szFit*0.10)/100;
  var cVec=topicVec(childText);
  var aVec=topicVec(acad.philosophy+' '+acad.fit_note);
  var tSim=cosine(cVec,aVec);
  var total=quant*0.7+tSim*0.3;
  var best=null,bestS=-1;
  Object.keys(TOPICS).forEach(function(k){
    var s=Math.min(cVec[k],aVec[k]);
    if(cVec[k]>0&&aVec[k]>0&&s>bestS){bestS=s; best=k;}
  });
  var reasons=[];
  if(zScore>=80) reasons.push('지금 학습 난이도에 딱 맞아요');
  if(aScore>=80&&child.autonomy>0) reasons.push('스스로 하는 걸 좋아하는 성향과 잘 맞아요');
  if(best) reasons.push("아이의 '"+TOPIC_LABEL[best]+"' 성향과 학원 소개가 잘 맞아요");
  if(!reasons.length) reasons.push('전반적으로 무난하게 맞는 편이에요');
  return {excluded:false, score:Math.round(total*100), quant:Math.round(quant*100), tSim:Math.round(tSim*100), reason:reasons.slice(0,2).join(' · ')};
}

    body.appendChild(el('<label>원장이 직접 가르치나요?</label>'));
    body.appendChild(acadPillGroup(null,['항상','가끔','거의 안 함'],false,'direct'));
    body.appendChild(el('<label>강사 소개 (자유 서술)</label><textarea id="f-tnote" placeholder="예: 13년차 초등 교사 출신 원장이 직접 모든 반을 맡고 있어요">'+acadForm.teacher_note+'</textarea>'));

  } else if(sec.key==='fit'){
    body.appendChild(el('<label>잘 맞는 아이 유형 (복수 선택)</label>'));
    body.appendChild(acadPillGroup(null,['토론하며 배우는 걸 좋아함','느린 아이도 환영','선행보다 이해 중심','경쟁을 즐김','조용히 집중하는 편','친구와 함께 배우고 싶어함','자기주도가 강한 아이','관리받는 걸 편해하는 아이'],true,'fit_tags'));
    body.appendChild(el('<label>어떤 아이에게 추천하고 싶은지 자유롭게 (학부모 화면에 노출)</label><textarea id="f-fnote2" placeholder="예: 혼자 끙끙대다 포기하기보다, 누군가와 이야기하면서 답을 찾아가는 걸 좋아하는 아이에게 잘 맞아요">'+acadForm.fit_note+'</textarea>'));
  }

  wrap.appendChild(body);

  /* 버튼 */
  var navRow=el('<div style="display:flex; gap:8px; margin-top:1.5rem;"></div>');
  if(idx>0){
    var bk=el('<button class="btn-ghost" style="width:auto; padding:11px 18px;">이전</button>');
    bk.onclick=function(){ saveFields(); acadForm.step--; renderContent(); };
    navRow.appendChild(bk);
  }
  var nx=el('<button class="btn-primary">'+(idx===ACAD_SECTIONS.length-1?'미리보기':'다음')+'</button>');
  nx.onclick=function(){ saveFields(); acadForm.step++; renderContent(); };
  navRow.appendChild(nx);
  wrap.appendChild(navRow);
  return wrap;
}

function saveFields(){
  var f;
  f=document.getElementById('f-name'); if(f) acadForm.name=f.value;
  f=document.getElementById('f-price'); if(f) acadForm.price=f.value;
  f=document.getElementById('f-liner'); if(f) acadForm.one_liner=f.value;
  f=document.getElementById('f-philo'); if(f) acadForm.philosophy=f.value;
  f=document.getElementById('f-fnote'); if(f) acadForm.format_note=f.value;
  f=document.getElementById('f-snote'); if(f) acadForm.spectrum_note=f.value;
  f=document.getElementById('f-enote'); if(f) acadForm.emotion_note=f.value;
  f=document.getElementById('f-tnote'); if(f) acadForm.teacher_note=f.value;
  f=document.getElementById('f-fnote2'); if(f) acadForm.fit_note=f.value;
  f=document.getElementById('f-sched'); if(f) acadForm.schedule=f.value;
}

function completeness(){
  var required=['name','subject','grade','price','one_liner','philosophy','format','size','pace','fit_note'];
  var filled=required.filter(function(k){
    var v=acadForm[k];
    return Array.isArray(v)?v.length>0:!!v;
  });
  return Math.round((filled.length/required.length)*100);
}

function renderAcadPreview(){
  var pct=completeness();
  var wrap=el('<div></div>');

  wrap.appendChild(el('<div style="text-align:center; margin-bottom:1.5rem;"><div style="font-size:32px; margin-bottom:.5rem;">✅</div><h2>학부모 화면에 이렇게 보여요</h2><p class="muted" style="font-size:13px;">제출하면 매칭 풀에 등록돼요</p></div>'));

  /* 미리보기 카드 */
  var preview=el('<div class="card" style="margin-bottom:1rem;"></div>');
  preview.innerHTML =
    '<p style="font-size:16px; font-weight:500; margin-bottom:4px;">'+(acadForm.name||'학원명')+'</p>' +
    '<p style="font-size:13px; color:var(--text-secondary); font-style:italic; margin-bottom:10px;">'+(acadForm.one_liner||'한 줄 소개가 여기 표시돼요')+'</p>';
  if(acadForm.philosophy){
    preview.appendChild(el('<div style="background:var(--surface-1); border-radius:var(--radius); padding:10px 12px; margin-bottom:10px;"><p style="font-size:13px; color:var(--text-secondary); line-height:1.6;">❝ '+acadForm.philosophy+' ❞</p></div>'));
  }
  if(acadForm.fit_note){
    preview.appendChild(el('<div class="alert success"><p style="font-weight:500; font-size:12px; margin-bottom:4px;">이런 아이에게 추천해요</p><p style="font-size:13px;">'+acadForm.fit_note+'</p></div>'));
  }
  /* 위치·편의 정보 */
  var infoRow=[];
  if(acadForm.gu) infoRow.push('📍 '+acadForm.gu);
  if(acadForm.parking) infoRow.push('🅿️ '+acadForm.parking);
  if(acadForm.shuttle) infoRow.push('🚌 '+acadForm.shuttle);
  if(acadForm.recruit_level) infoRow.push('📋 '+acadForm.recruit_level+' 모집 중');
  if(infoRow.length){
    preview.appendChild(el('<div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;">'+infoRow.map(function(t){return '<span style="font-size:11px; background:var(--surface-1); color:var(--text-secondary); padding:3px 8px; border-radius:10px;">'+t+'</span>';}).join('')+'</div>'));
  }
  if(acadForm.schedule){
    preview.appendChild(el('<div style="margin-top:10px; font-size:12px; color:var(--text-secondary); line-height:1.6;">📅 '+acadForm.schedule+'</div>'));
  }
  if(acadForm.fit_tags && acadForm.fit_tags.length){
    var tagBox=el('<div style="margin-top:6px;"></div>');
    acadForm.fit_tags.forEach(function(t){ tagBox.appendChild(el('<span class="tag">#'+t.replace(/\s/g,'')+'</span>')); });
    preview.appendChild(tagBox);
  }
  wrap.appendChild(preview);

  /* 완성도 */
  var alertClass = pct>=85?'success':'info';
  wrap.appendChild(el('<div class="alert '+alertClass+'">🏆 정보 완성도 '+pct+'% — '+(pct>=85?'노출 우선 배지가 부여돼요':'서술형 항목을 더 채우면 검색 상위 노출 혜택을 받을 수 있어요')+'</div>'));

  /* 버튼 */
  var navRow=el('<div style="display:flex; gap:8px;"></div>');
  var bk=el('<button class="btn-ghost" style="width:auto; padding:11px 18px;">수정하기</button>');
  bk.onclick=function(){ acadForm.step=ACAD_SECTIONS.length-1; renderContent(); };
  navRow.appendChild(bk);
  var submit=el('<button class="btn-primary">등록하고 매칭 풀에 추가하기</button>');
  submit.onclick=function(){
    var newAcad={
      name:acadForm.name||'새 학원',
      subject:acadForm.subject.join('·')||'전과목',
      emoji:'🆕',
      desc:acadForm.one_liner||acadForm.name||'새로 등록된 학원',
      philosophy:acadForm.philosophy||'',
      fit_note:acadForm.fit_note||'',
      size:({
        '1명 (1:1)':1,'2-3명':2,'4-6명':5,'7-10명':8,'11명 이상':15
      }[acadForm.size])||5,
      price:Math.round((parseInt(acadForm.price)||400000)/10000),
      manage:({
        '엄격한 관리':0,'자율에 맡김':100
      })||'보통',
      gu:acadForm.gu||'', parking:acadForm.parking||'', shuttle:acadForm.shuttle||'', schedule:acadForm.schedule||'', recruit_level:acadForm.recruit_level||'',
      pace:acadForm.pace||'현행',
      profile:{
        autonomy: acadForm.sliders.strict_free>60?1:-1,
        zpd_strain: acadForm.pace&&acadForm.pace.indexOf('선행')>=0?1:0,
        competence:1, burnout:acadForm.manage==='강함'?1:-1,
        social: acadForm.talkratio==='학생이 더 많이 말함'?2:0,
        style:'visual', focus:'mixed'
      },
      reviews:0, rating:0
    };
    registeredAcademies.push(newAcad);
    acadForm={
      name:'',subject:[],grade:[],price:'',extra:[],
      one_liner:'',philosophy:'',
      format:[],size:'',talkratio:'',pace:'',
      homework:'',test:'',feedback:'',
      refusal:'',praise:'',emotion_note:'',
      career:[],direct:'',teacher_note:'',
      fit_tags:[],fit_note:'',
      sliders:{lecture_discuss:50,fixed_individual:50,strict_free:50,result_process:50},
      gu:'',parking:'',shuttle:'',schedule:'',recruit_level:'',
      step:0
    };
    var msg=el('<div class="alert success" style="margin-bottom:1rem;">✅ 등록 완료! 학부모 진단 탭에서 이 학원이 매칭되는지 확인해보세요.</div>');
    wrap.prepend(msg);
    submit.disabled=true; submit.textContent='등록 완료';
  };
  navRow.appendChild(submit);
  wrap.appendChild(navRow);
  return wrap;
}

/* ───────────── 초기 렌더 ───────────── */
renderContent();
</script>
</body>
</html>
