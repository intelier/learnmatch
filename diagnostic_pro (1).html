<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이 학습 성향 진단 | LearnMatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* 색상 시스템 */
  --navy:       #1a2e4a;
  --navy-light: #243d61;
  --navy-muted: #6b7f97;
  --ivory:      #faf8f4;
  --ivory-dark: #f0ece3;
  --ivory-border:#e2ddd3;
  --amber:      #c8860a;
  --amber-light:#fdf3e0;
  --amber-border:#e8c57a;
  --sage:       #3d6b4f;
  --sage-light: #eaf3ec;
  --sage-border:#9ec9aa;
  --warning-bg: #fdf0e0;
  --warning:    #9a5c00;
  --error-bg:   #fdecea;
  --error:      #8b1a1a;
  --white:      #ffffff;

  /* 타이포 */
  --serif:  'Noto Serif KR', 'Georgia', serif;
  --sans:   'Noto Sans KR', -apple-system, sans-serif;

  --radius-sm: 4px;
  --radius:    10px;
  --radius-lg: 16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--ivory);
  color:var(--navy);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}

/* ── 레이아웃 ── */
#wrap{max-width:580px; margin:0 auto; padding:0 1.25rem 5rem;}

/* ── 헤더 ── */
#site-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:1.25rem 0; border-bottom:1px solid var(--ivory-border);
  margin-bottom:2rem;
}
.logo{font-family:var(--serif); font-size:17px; font-weight:600; color:var(--navy); letter-spacing:-.3px;}
.logo span{color:var(--amber);}
.badge-theory{
  font-size:10px; font-weight:500; letter-spacing:.6px; text-transform:uppercase;
  color:var(--navy-muted); border:1px solid var(--ivory-border); border-radius:20px;
  padding:3px 10px;
}

/* ── 스텝 인디케이터 ── */
#step-indicator{
  display:flex; align-items:center; gap:0; margin-bottom:2rem;
}
.step-dot{
  width:28px; height:28px; border-radius:50%; border:1.5px solid var(--ivory-border);
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600; color:var(--navy-muted);
  background:var(--white); flex-shrink:0; position:relative; z-index:1;
}
.step-dot.active{border-color:var(--navy); color:var(--navy); background:var(--ivory-dark);}
.step-dot.done{border-color:var(--sage); color:var(--white); background:var(--sage);}
.step-line{flex:1; height:1px; background:var(--ivory-border);}
.step-line.done{background:var(--sage);}

/* ── 진행 바 ── */
.progress-track{
  height:3px; background:var(--ivory-border); border-radius:2px;
  margin-bottom:2rem; overflow:hidden;
}
.progress-fill{height:100%; background:var(--amber); border-radius:2px; transition:width .4s ease;}

/* ── 레이블 ── */
.eyebrow{
  font-size:10px; letter-spacing:.8px; text-transform:uppercase;
  font-weight:600; color:var(--navy-muted); margin-bottom:.4rem;
  font-family:var(--sans);
}
.theory-tag{
  display:inline-block; font-size:10px; letter-spacing:.4px;
  color:var(--amber); border:1px solid var(--amber-border);
  background:var(--amber-light); border-radius:20px;
  padding:2px 9px; margin-bottom:1rem; font-weight:500;
}

/* ── 타이포 ── */
h1{font-family:var(--serif); font-size:24px; font-weight:600; line-height:1.4; letter-spacing:-.5px;}
h2{font-family:var(--serif); font-size:20px; font-weight:600; line-height:1.4; letter-spacing:-.3px;}
h3{font-size:15px; font-weight:600;}
.lead{font-size:15px; color:var(--navy-muted); line-height:1.75;}

/* ── 카드 ── */
.card{
  background:var(--white); border:1px solid var(--ivory-border);
  border-radius:var(--radius-lg); padding:1.5rem;
  margin-bottom:1rem;
}
.card-inner{
  background:var(--ivory); border:1px solid var(--ivory-border);
  border-radius:var(--radius); padding:1rem 1.25rem; margin-bottom:.75rem;
}

/* ── 선택지 버튼 ── */
.opt{
  width:100%; text-align:left;
  border:1px solid var(--ivory-border); background:var(--white);
  border-radius:var(--radius); padding:14px 16px;
  font-size:14px; font-family:var(--sans); color:var(--navy);
  display:block; margin-bottom:8px; cursor:pointer;
  transition:border-color .15s, background .15s, transform .1s;
  line-height:1.5;
}
.opt:hover{border-color:var(--navy); background:var(--ivory); transform:translateX(2px);}
.opt:active{transform:translateX(0);}

/* ── 필 버튼 ── */
.pill{
  border:1px solid var(--ivory-border); background:var(--white);
  border-radius:20px; padding:7px 15px; font-size:13px;
  font-family:var(--sans); color:var(--navy-muted); cursor:pointer;
  display:inline-block; margin:0 6px 6px 0;
  transition:all .15s;
}
.pill.on{
  border-color:var(--navy); background:var(--navy); color:var(--white);
}

/* ── 버튼 ── */
.btn-primary{
  width:100%; background:var(--navy); color:var(--white);
  border:none; padding:14px; font-size:14px; font-weight:600;
  border-radius:var(--radius); font-family:var(--sans);
  cursor:pointer; letter-spacing:.1px;
  transition:background .15s, transform .1s;
}
.btn-primary:hover{background:var(--navy-light); transform:translateY(-1px);}
.btn-ghost{
  background:transparent; border:1px solid var(--ivory-border);
  color:var(--navy-muted); padding:13px 20px; font-size:14px;
  font-weight:500; border-radius:var(--radius); font-family:var(--sans);
  cursor:pointer; transition:all .15s;
}
.btn-ghost:hover{border-color:var(--navy); color:var(--navy);}

/* ── 알림 ── */
.alert{border-radius:var(--radius); padding:14px 16px; font-size:13px; line-height:1.7; margin-bottom:1rem;}
.alert.warn{background:var(--warning-bg); color:var(--warning); border:1px solid #e8c57a;}
.alert.info{background:var(--amber-light); color:var(--amber); border:1px solid var(--amber-border);}
.alert.good{background:var(--sage-light); color:var(--sage); border:1px solid var(--sage-border);}

/* ── 리포트 특화 ── */
.report-section{
  border-top:1px solid var(--ivory-border); padding-top:1.5rem; margin-top:1.5rem;
}
.report-section:first-child{border-top:none; padding-top:0; margin-top:0;}

.metric-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:1.25rem;}
.metric-box{
  background:var(--ivory); border:1px solid var(--ivory-border);
  border-radius:var(--radius); padding:12px 14px;
}
.metric-label{font-size:11px; letter-spacing:.4px; color:var(--navy-muted); margin-bottom:8px; font-weight:500;}
.metric-bar-track{display:flex; gap:3px;}
.metric-bar-seg{flex:1; height:5px; border-radius:3px;}

/* 레이더 차트 */
#radar-wrap{display:flex; justify-content:center; margin:1.25rem 0;}

/* 학원 매칭 카드 */
.match-card{
  background:var(--white); border:1px solid var(--ivory-border);
  border-radius:var(--radius-lg); overflow:hidden; margin-bottom:12px;
}
.match-rank{
  background:var(--navy); color:var(--white);
  font-size:10px; letter-spacing:.8px; font-weight:600;
  padding:5px 14px; display:inline-block;
  border-radius:0 0 var(--radius-sm) 0;
  text-transform:uppercase;
}
.match-body{padding:14px 16px 16px;}
.match-score{
  font-size:26px; font-weight:600; font-family:var(--serif);
  color:var(--navy); line-height:1;
}
.match-score span{font-size:13px; font-weight:400; color:var(--navy-muted); font-family:var(--sans);}
.score-breakdown{
  display:flex; gap:12px; font-size:11px; color:var(--navy-muted);
  margin:6px 0 10px; letter-spacing:.2px;
}
.match-reason{
  background:var(--sage-light); border:1px solid var(--sage-border);
  border-radius:var(--radius-sm); padding:8px 12px;
  font-size:12px; color:var(--sage); margin-bottom:10px; line-height:1.6;
}
.match-meta{
  display:flex; gap:16px; font-size:12px; color:var(--navy-muted); margin-bottom:12px;
}
.consult-btn{
  width:100%; border:1px solid var(--navy); color:var(--navy);
  background:transparent; padding:11px; font-size:13px; font-weight:600;
  border-radius:var(--radius-sm); font-family:var(--sans); cursor:pointer;
  transition:all .15s;
}
.consult-btn:hover{background:var(--navy); color:var(--white);}

/* 구분선 레이블 */
.divider-label{
  display:flex; align-items:center; gap:10px;
  font-size:10px; letter-spacing:.8px; text-transform:uppercase;
  color:var(--navy-muted); font-weight:600; margin:1.5rem 0 1rem;
}
.divider-label::before,.divider-label::after{
  content:''; flex:1; height:1px; background:var(--ivory-border);
}

/* 인트로 히어로 */
.hero{text-align:center; padding:3rem 0 2.5rem;}
.hero-badge{
  display:inline-flex; align-items:center; gap:6px;
  border:1px solid var(--ivory-border); border-radius:20px;
  padding:5px 14px; font-size:11px; letter-spacing:.5px;
  color:var(--navy-muted); margin-bottom:1.5rem; font-weight:500;
}
.hero-badge::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--sage); display:inline-block;}
.hero h1{margin-bottom:1rem; max-width:400px; margin-left:auto; margin-right:auto;}
.hero .lead{max-width:380px; margin:0 auto 2rem;}
.hero-stats{
  display:flex; justify-content:center; gap:2rem; margin-bottom:2rem;
  padding:1.25rem 0; border-top:1px solid var(--ivory-border); border-bottom:1px solid var(--ivory-border);
}
.hero-stat-n{font-family:var(--serif); font-size:22px; font-weight:600; color:var(--navy);}
.hero-stat-l{font-size:11px; color:var(--navy-muted); margin-top:2px;}

/* 로딩 */
.loading-wrap{text-align:center; padding:4rem 1rem;}
.loading-ring{
  width:48px; height:48px; border:3px solid var(--ivory-border);
  border-top-color:var(--navy); border-radius:50%;
  animation:spin .8s linear infinite; margin:0 auto 1.5rem;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* 인쇄 느낌 헤더 */
.report-header{
  border:1px solid var(--ivory-border); border-radius:var(--radius-lg);
  overflow:hidden; margin-bottom:1.25rem;
}
.report-header-top{
  background:var(--navy); color:var(--white);
  padding:1.25rem 1.5rem;
}
.report-header-bottom{
  background:var(--white); padding:1.25rem 1.5rem;
  display:grid; grid-template-columns:1fr 1fr; gap:1rem;
}
.report-field-label{font-size:10px; letter-spacing:.6px; color:var(--navy-muted); text-transform:uppercase; margin-bottom:3px;}
.report-field-val{font-size:14px; font-weight:600; color:var(--navy);}
</style>
</head>

function el(h){var d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function fmtDate(){var d=new Date();return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';}

function topicVec(t){
  var v={}; Object.keys(TOPICS).forEach(function(k){v[k]=0;});
  if(!t) return v;
  Object.keys(TOPICS).forEach(function(k){ TOPICS[k].forEach(function(w){ if(t.indexOf(w)>=0) v[k]+=1; }); });
  return v;
}
function cosine(a,b){
  var ks=Object.keys(TOPICS),dot=0,na=0,nb=0;
  ks.forEach(function(k){dot+=a[k]*b[k];na+=a[k]*a[k];nb+=b[k]*b[k];});
  return (na===0||nb===0)?0:dot/(Math.sqrt(na)*Math.sqrt(nb));
}

/* ───── 레이더 SVG ───── */
function radarSVG(scores){
  var cx=120,cy=120,r=80;
  var labels=['자율성','유능감','사회성','정서안정','집중력'];
  var vals=scores;
  var n=labels.length;
  function pt(i,mag){
    var a=(-Math.PI/2)+(2*Math.PI*i/n);
    return {x:cx+mag*Math.cos(a), y:cy+mag*Math.sin(a)};
  }
  var svg='<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">';
  /* 격자 */
  [0.25,0.5,0.75,1].forEach(function(frac){
    var pts=[];
    for(var i=0;i<n;i++){var p=pt(i,r*frac);pts.push(p.x+','+p.y);}
    svg+='<polygon points="'+pts.join(' ')+'" fill="none" stroke="#e2ddd3" stroke-width="1"/>';
  });
  /* 축 */
  for(var i=0;i<n;i++){var p=pt(i,r);svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="#e2ddd3" stroke-width="1"/>';}
  /* 데이터 */
  var dpts=[];
  for(var i=0;i<n;i++){var p=pt(i,r*vals[i]);dpts.push(p.x+','+p.y);}
  svg+='<polygon points="'+dpts.join(' ')+'" fill="#1a2e4a" fill-opacity=".12" stroke="#1a2e4a" stroke-width="2"/>';
  /* 점 */
  for(var i=0;i<n;i++){var p=pt(i,r*vals[i]);svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4" fill="#1a2e4a"/>';}
  /* 레이블 */
  for(var i=0;i<n;i++){
    var p=pt(i,r+18);
    svg+='<text x="'+p.x+'" y="'+p.y+'" text-anchor="middle" dominant-baseline="middle" font-size="10" font-family="Noto Sans KR, sans-serif" fill="#6b7f97">'+labels[i]+'</text>';
  }
  svg+='</svg>';
  return svg;
}

/* ───── 매칭 ───── */
function matchAcad(child, ct, acad){
  if(child.burnout>=3&&acad.manage==='강함') return {excluded:true};
  var zd=Math.abs((child.zpd_strain||0)-(acad.profile.zpd_strain||0));
  var zs=clamp(100-zd*20,0,100);
  var ad=Math.abs((child.autonomy||0)-(acad.profile.autonomy||0));
  var as_=clamp(100-ad*18,0,100);
  var ss=child.style===acad.profile.style?100:55;
  var szf=100;
  if(child.social<=-1&&acad.size>8) szf=50;
  if(child.social>=1&&acad.size>=3&&acad.size<=6) szf=100;
  var bs=100;
  if(child.burnout>=1&&acad.manage==='강함') bs=40;
  else if(child.burnout>=1) bs=88;
  var q=(zs*0.30+as_*0.25+bs*0.20+ss*0.15+szf*0.10)/100;
  var cv=topicVec(ct);
  var av=topicVec(acad.philosophy+' '+acad.fit_note);
  var ts=cosine(cv,av);
  var total=q*0.7+ts*0.3;
  var best=null,bst=-1;
  Object.keys(TOPICS).forEach(function(k){
    var s=Math.min(cv[k],av[k]);
    if(cv[k]>0&&av[k]>0&&s>bst){bst=s;best=k;}
  });
  var reasons=[];
  if(zs>=80) reasons.push('학습 난이도가 딱 맞아요');
  if(as_>=80&&child.autonomy>0) reasons.push('자기주도 성향과 수업 방식이 맞아요');
  if(best) reasons.push("'"+TOPIC_LABEL[best]+"' 성향과 학원 소개가 일치해요");
  if(!reasons.length) reasons.push('전반적으로 무난하게 맞는 편이에요');
  return {excluded:false,score:Math.round(total*100),q:Math.round(q*100),ts:Math.round(ts*100),reason:reasons[0]};
}

function stepIndicator(current){
  var steps=['기본정보','진단','리포트'];
  var idx = current===0?0:current===1?0:current<2+QUESTIONS.length?1:2;
  var html='<div id="step-indicator">';
  steps.forEach(function(s,i){
    var cls='step-dot'+(i<idx?' done':i===idx?' active':'');
    html+='<div class="'+cls+'">'+(i<idx?'✓':(i+1))+'</div>';
    if(i<steps.length-1) html+='<div class="step-line'+(i<idx?' done':'')+'"></div>';
  });
  html+='</div>';
  return el(html);
}

    if(v.style)sc[v.style]=(sc[v.style]||0)+1;
    if(v.focus)fc[v.focus]=(fc[v.focus]||0)+1;
  });
  var bs='visual',bn=-1;Object.keys(sc).forEach(function(s){if(sc[s]>bn){bn=sc[s];bs=s;}});p.style=bs;

  return p;
}

    '</div>' +
    '<div class="report-header-bottom">' +
      '<div><div class="report-field-label">발급일</div><div class="report-field-val">'+fmtDate()+'</div></div>' +
      '<div><div class="report-field-label">진단 문항</div><div class="report-field-val">'+QUESTIONS.length+'문항 완료</div></div>' +
      '<div><div class="report-field-label">진단 기반</div><div class="report-field-val">발달심리학 4개 이론</div></div>' +
      '<div><div class="report-field-label">매칭 대상</div><div class="report-field-val">'+ACADEMIES.length+'개 학원</div></div>' +
    '</div>';
  wrap.appendChild(rh);

  /* 경고 */
  if(burnoutFlag) wrap.appendChild(el('<div class="alert warn">⚠️ 번아웃 신호 감지 — 학습량 확대보다 정서적 회복이 우선 필요한 상태예요.</div>'));
  if(S.wants.indexOf('선행을 시키고 싶다')>=0&&zpdFlag) wrap.appendChild(el('<div class="alert info">📌 선행을 원하셨지만, 현재 수준도 다소 버거워하는 상태예요. 지금 개념을 단단히 다지는 게 더 효과적일 수 있어요.</div>'));

  /* 레이더 */
  var divL1=el('<div class="divider-label">성향 프로파일</div>');
  wrap.appendChild(divL1);
  var radarWrap=el('<div id="radar-wrap"></div>');
  radarWrap.innerHTML=radarSVG(radarVals);
  wrap.appendChild(radarWrap);

  /* 지표 4개 */
  var divL2=el('<div class="divider-label">세부 지표</div>');
  wrap.appendChild(divL2);
  var grid=el('<div class="metric-grid"></div>');
  function mBox(label,lv,color){
    var segs='';
    for(var i=1;i<=5;i++) segs+='<div class="metric-bar-seg" style="background:'+(i<=lv?color:'var(--ivory-border)')+'"></div>';
    return el('<div class="metric-box"><div class="metric-label">'+label+'</div><div class="metric-bar-track">'+segs+'</div></div>');
  }
  grid.appendChild(mBox('자율성',aLv,'var(--navy)'));
  grid.appendChild(mBox('자신감 (유능감)',cLv,'var(--navy)'));
  grid.appendChild(mBox('관계 학습 선호',sLv,'var(--amber)'));
  grid.appendChild(mBox('정서 안정도',6-bLv,'var(--sage)'));
  wrap.appendChild(grid);

  /* 요약 */
  var divL3=el('<div class="divider-label">진단 요약</div>');
  wrap.appendChild(divL3);
  var summary=el('<div class="card-inner"></div>');
  summary.innerHTML='<p style="font-size:14px; line-height:1.8; color:var(--navy);">아이는 <strong>'+(p.autonomy>0?'스스로 생각할 시간이 필요하고':'함께 배울 때 더 잘하고')+'</strong>, <strong>'+styleLabel(p.style)+'</strong> 방식으로 배울 때 가장 잘 이해해요. '+(p.social>=1?'소그룹 토론형 수업이 동기를 높여줄 가능성이 커요.':'조용한 환경에서 집중할 수 있는 수업이 잘 맞아요.')+'</p>';
  wrap.appendChild(summary);

  /* 맞는 수업 / 피할 수업 */
  var twoCol=el('<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:.75rem; margin-bottom:1rem;"></div>');
  var good=el('<div class="card-inner"></div>');
  good.innerHTML='<div class="eyebrow" style="color:var(--sage); margin-bottom:.5rem;">✓ 잘 맞는 수업</div>' +
    '<p style="font-size:13px; line-height:1.75; color:var(--navy-muted);">'+(p.social>=1?'소그룹 토론·질문형':'1:1 개별 맞춤형')+'<br>'+(p.autonomy>0?'스스로 풀어보는 시간 多':'단계별로 짚어주는 관리형')+'</p>';
  var bad=el('<div class="card-inner"></div>');
  bad.innerHTML='<div class="eyebrow" style="color:var(--amber); margin-bottom:.5rem;">✗ 지금 피할 것</div>' +
    '<p style="font-size:13px; line-height:1.75; color:var(--navy-muted);">'+(zpdFlag?'현재보다 빠른 선행':'지나치게 느슨한 진도')+'<br>'+(burnoutFlag?'고강도 숙제·관리형':'일방적 강의식 수업')+'</p>';
  twoCol.appendChild(good);
  twoCol.appendChild(bad);
  wrap.appendChild(twoCol);

  /* 매칭 결과 */
  var divL4=el('<div class="divider-label">학원 매칭 결과</div>');
  wrap.appendChild(divL4);
  wrap.appendChild(el('<p class="lead" style="font-size:12px; margin-bottom:1rem;">정량 매칭(70%) + 텍스트 의미 유사도(30%) 결합 산출</p>'));

  var results=ACADEMIES.map(function(a){return{a:a,m:matchAcad(p,ct,a)};})
    .filter(function(r){return!r.m.excluded;})
    .sort(function(x,y){return y.m.score-x.m.score;});
  var excl=ACADEMIES.length-results.length;
  if(excl>0) wrap.appendChild(el('<p style="font-size:11px; color:var(--warning); margin-bottom:.75rem;">⚠ 번아웃 신호로 인해 고강도 관리 학원 '+excl+'곳은 제외됐어요</p>'));

  var ranks=['1순위','2순위','3순위','4순위'];
  results.forEach(function(r,idx){
    var mc=el('<div class="match-card"></div>');
    mc.innerHTML=
      '<div class="match-rank">'+ranks[idx]+'</div>' +
      '<div class="match-body">' +
        '<div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px;">' +
          '<div>' +
            '<div class="eyebrow" style="margin-bottom:2px;">'+r.a.subject+'</div>' +
            '<h3>'+r.a.name+'</h3>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<div class="match-score">'+r.m.score+'<span> / 100</span></div>' +
          '</div>' +
        '</div>' +
        '<div class="score-breakdown">정량 '+r.m.q+' · 텍스트 유사도 '+r.m.ts+'</div>' +
        '<p style="font-size:13px; color:var(--navy-muted); margin-bottom:10px; line-height:1.6;">'+r.a.desc+'</p>' +
        '<div class="match-reason">💡 '+r.m.reason+'</div>' +
        '<div class="match-meta">'+
          '<span>👥 평균 '+r.a.size+'명</span>'+
          '<span>💰 월 '+r.a.price+'만원</span>'+
          '<span>★ '+r.a.rating+' ('+r.a.reviews+')</span>'+
        '</div>'+
        '<details style="margin-bottom:12px;"><summary style="font-size:11px; color:var(--navy-muted); cursor:pointer; letter-spacing:.2px;">학원 소개 상세 보기 ▾</summary>' +
          '<p style="font-size:12px; color:var(--navy-muted); margin-top:8px; line-height:1.7;">'+r.a.philosophy+'</p>' +
          '<p style="font-size:12px; color:var(--navy-muted); margin-top:4px; line-height:1.7; font-style:italic;">"'+r.a.fit_note+'"</p></details>' +
        '<button class="consult-btn">상담 신청하기</button>' +
      '</div>';
    mc.querySelector('.consult-btn').onclick=function(e){
      e.target.textContent='✓ 신청 완료 (데모)';
      e.target.disabled=true; e.target.style.opacity='.4';
    };
    wrap.appendChild(mc);
  });

  /* 재시작 */
  var restart=el('<button style="display:block; width:100%; background:transparent; border:none; color:var(--navy-muted); font-size:12px; padding:14px; margin-top:.5rem; cursor:pointer;">처음부터 다시 진단하기</button>');
  restart.onclick=function(){S={step:0,answers:{},kwBag:[],wants:[]};render();};
  wrap.appendChild(restart);

  return wrap;
}

render();
</script>
</body>
</html>
